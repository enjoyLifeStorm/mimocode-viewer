name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck || true

      - name: Build executable
        run: bun build --compile --outfile=mimocode-viewer src/server.ts

      - name: Verify binary
        run: ./mimocode-viewer --help || true
