name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: mimocode-viewer
          - os: ubuntu-latest
            target: linux-arm64
            binary: mimocode-viewer
          - os: macos-latest
            target: darwin-x64
            binary: mimocode-viewer
          - os: macos-latest
            target: darwin-arm64
            binary: mimocode-viewer
          - os: windows-latest
            target: win-x64
            binary: mimocode-viewer.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build executable
        run: bun build --compile --target=bun-${{ matrix.target }} --outfile=${{ matrix.binary }} src/server.ts

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.binary }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.binary }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.binary }}-${{ matrix.target }}.tar.gz
            ${{ matrix.binary }}-${{ matrix.target }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create tag
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
